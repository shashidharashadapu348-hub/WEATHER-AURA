kind = "web"
previewPath = "/"
title = "Weather Dashboard"
version = "1.0.0"
id = "artifacts/weather-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20300

[services.development]
run = "pnpm --filter @workspace/weather-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/weather-dashboard", "run", "build" ]
publicDir = "artifacts/weather-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20300"
BASE_PATH = "/"
